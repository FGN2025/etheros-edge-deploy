upstream open_webui { server etheros-open-webui:8080; }
upstream ollama_backend { server etheros-ollama:11434; }
upstream grafana_backend { server etheros-grafana:3000; }
upstream prometheus_backend { server etheros-prometheus:9090; }

server { listen 80; server_name edge.etheros.ai; return 301 https://$host$request_uri; }

server {
    listen 443 ssl; server_name edge.etheros.ai;
    ssl_certificate /etc/letsencrypt/live/edge.etheros.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge.etheros.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3; ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m; ssl_session_timeout 10m;
    client_max_body_size 100M; proxy_read_timeout 300s; proxy_send_timeout 300s;

    # ── Root → ISP Portal SPA ────────────────────────────────────
    location / {
        root /opt/etheros-edge/static/isp-portal;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── ISP Portal SPA — /isp-portal/ → static files + hash-router fallback ──
    # Hash-router: all real navigation is #/... so nginx only ever needs
    # to serve index.html + assets/*.  try_files falls back to index.html.
    location /isp-portal/ {
        alias /opt/etheros-edge/static/isp-portal/;
        index index.html;
        try_files $uri $uri/ index.html;
        add_header Cache-Control "no-cache";
    }

    # ── ISP Portal API (legacy prefix — matches frontend API_BASE) ─
    location /isp-portal/api/chat/stream {
        proxy_pass http://etheros-isp-portal-backend:3010/api/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off; proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 120s; chunked_transfer_encoding on;
    }
    location /isp-portal/api/ {
        proxy_pass http://etheros-isp-portal-backend:3010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /isp-portal/health {
        proxy_pass http://etheros-isp-portal-backend:3010/health;
    }

    # ── Acquisition landing pages → /pages/:slug ────────────────────────────
    # Serves the ISP portal SPA; React router handles /pages/:slug client-side
    location /pages/ {
        root /opt/etheros-edge/static/isp-portal;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Open WebUI → /chat/ + its absolute-path assets ───────────
    location /chat/ {
        proxy_pass http://open_webui/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Open WebUI emits absolute paths — proxy them all to the container
    location /_app/ {
        proxy_pass http://open_webui/_app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /static/ {
        proxy_pass http://open_webui/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /manifest.json {
        proxy_pass http://open_webui/manifest.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # Open WebUI API + supporting paths
    # ISP portal frontend uses /isp-portal/api/ exclusively, so /api/ is safe
    # to route entirely to Open WebUI
    location /api/ {
        proxy_pass http://open_webui/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
    location /openai/ {
        proxy_pass http://open_webui/openai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
    location /ws/ {
        proxy_pass http://open_webui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
        proxy_set_header Host $host; proxy_read_timeout 3600s;
    }

    # ── Marketplace ──────────────────────────────────────────────
    location /marketplace/ {
        alias /opt/etheros-edge/static/marketplace/;
        try_files $uri $uri/ /marketplace/index.html;
        add_header Cache-Control "no-cache";
    }
    location /marketplace/api/ {
        proxy_pass http://etheros-marketplace-backend:3011/api/;
        proxy_http_version 1.1; proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off; proxy_cache off; proxy_read_timeout 300s;
        proxy_connect_timeout 10s; chunked_transfer_encoding on;
    }
    location /marketplace/health { proxy_pass http://etheros-marketplace-backend:3011/health; }

    # ── Ollama ───────────────────────────────────────────────────
    location /ollama/v1/ { rewrite ^/ollama/v1/(.*)$ /v1/$1 break; proxy_pass http://ollama_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /ollama/api/ { rewrite ^/ollama/api/(.*)$ /api/$1 break; proxy_pass http://ollama_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }

    # ── Grafana ──────────────────────────────────────────────────
    location /grafana/ { proxy_pass http://grafana_backend/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
}

server {
    listen 8443 ssl; server_name edge.etheros.ai;
    ssl_certificate /etc/letsencrypt/live/edge.etheros.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge.etheros.ai/privkey.pem;
    ssl_client_certificate /etc/nginx/ssl/etheros-ca.crt;
    ssl_verify_client optional; ssl_protocols TLSv1.2 TLSv1.3;
    location /v1/ { proxy_pass http://ollama_backend/v1/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Client-Verified $ssl_client_verify; proxy_set_header X-Client-DN $ssl_client_s_dn; }
}
