# ============================================================
#  EtherOS Kiosk Configuration
#  Edit this file before running etheros-kiosk-bootstrap.sh
#  OR place it at /etc/etheros/kiosk.conf on a running kiosk
#  to reconfigure without reinstalling.
# ============================================================

# ── Terminal URL ──────────────────────────────────────────
# The full URL Chromium opens in kiosk mode.
# Change this to your ISP's custom domain if you have one.
KIOSK_URL="https://edge.etheros.ai/isp-portal/#/terminal"

# ── ISP Identity ──────────────────────────────────────────
ISP_NAME="EtherOS"
ISP_ACCENT_COLOR="#00C2CB"

# ── Support Contact ───────────────────────────────────────
# Shown on the offline splash page when no network is detected.
SUPPORT_PHONE="+1(480)808-0077"
SUPPORT_EMAIL="support@etheros.ai"
SUPPORT_URL="https://etheros.ai"

# ── Kiosk User ────────────────────────────────────────────
# A dedicated non-root user created for the kiosk session.
# Do not use 'root' or an existing admin account.
KIOSK_USER="etheros-kiosk"

# ── Display ───────────────────────────────────────────────
# Screen resolution. Leave blank to use detected resolution.
# Examples: "1920x1080", "1366x768", "1280x720"
DISPLAY_RESOLUTION=""

# ── Network ───────────────────────────────────────────────
# Seconds to wait for network before showing offline splash.
NETWORK_TIMEOUT=20

# ── Chromium flags ────────────────────────────────────────
# Additional Chromium flags appended to the kiosk launch.
# Leave blank for defaults. Example: "--disable-gpu"
CHROMIUM_EXTRA_FLAGS=""

# ── Recovery ─────────────────────────────────────────────
# Key combo to drop to TTY for admin recovery.
# Default: Ctrl+Alt+F2 (always works regardless of this setting).
# This is informational — it documents the escape for your team.
RECOVERY_TTY="Ctrl+Alt+F2"

# ── USB Config Override ───────────────────────────────────
# If a USB drive is mounted at /media/usb/ containing a file
# named kiosk.conf, it overrides this file on every boot.
# Set to "yes" to enable USB override, "no" to disable.
USB_CONFIG_OVERRIDE="yes"
